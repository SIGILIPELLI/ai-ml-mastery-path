site_name: AI & Machine Learning Mastery Path
site_description: A structured, module-wise AI & Machine Learning training program from entry level to master level — classical ML with scikit-learn through deep learning with PyTorch.
site_url: https://sigilipelli.github.io/ai-ml-mastery-path/
repo_url: https://github.com/SIGILIPELLI/ai-ml-mastery-path
repo_name: ai-ml-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & the Scientific Python Stack": level-1/01-setup-scientific-python.md
      - "02 · NumPy & Pandas Essentials": level-1/02-numpy-pandas.md
      - "03 · Data Preparation": level-1/03-data-preparation.md
      - "04 · Regression": level-1/04-regression.md
      - "05 · Classification": level-1/05-classification.md
      - "06 · Clustering & Unsupervised Learning": level-1/06-clustering-unsupervised.md
      - "07 · Model Evaluation & Cross-Validation": level-1/07-model-evaluation.md
      - "08 · Feature Engineering & Pipelines": level-1/08-feature-engineering-pipelines.md
      - "09 · Neural Network Fundamentals with PyTorch": level-1/09-neural-networks-pytorch.md
      - "10 · Capstone — End-to-End Tabular ML Project": level-1/10-capstone-project.md
  - "Level 2 · Intermediate":
